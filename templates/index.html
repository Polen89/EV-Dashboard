<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="header">
    <h1>⚡ EV Dashboard</h1>
    <div class="meta">
        last updated<br>
        <span id="timestamp"></span>
    </div>
</div>

<div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search table..." oninput="filterTable()">

    <div class="filter-bar">
        <select id="makeFilter" onchange="loadAll()">
            <option value="">All Makes</option>
            {% for make in makes %}
            <option value="{{ make }}">{{ make }}</option>
            {% endfor %}
        </select>

        <select id="limitFilter" onchange="loadAll()">
            <option value="5">Top 5</option>
            <option value="10" selected>Top 10</option>
            <option value="25">Top 25</option>
            <option value="50">Top 50</option>
        </select>

        <button id="exportBtn" class="action-btn" onclick="exportCSV()">Download CSV</button>
    </div>
</div>

<div id="statusMessage" class="status-message hidden"></div>

<div class="cards">
    <div class="card">
        <div class="label">Total Vehicles</div>
        <div class="value" id="totalVehicles">—</div>
    </div>
    <div class="card">
        <div class="label">Top Make</div>
        <div class="value" id="topMake">—</div>
        <span class="tooltip" id="topMakeTip"></span>
    </div>
    <div class="card">
        <div class="label">Top Model</div>
        <div class="value" id="topModel">—</div>
        <span class="tooltip" id="topModelTip"></span>
    </div>
</div>

<div class="tabs">
    <button class="tab active" onclick="setTab('model', event)">By Model</button>
    <button class="tab" onclick="setTab('city', event)">By City</button>
    <button class="tab" onclick="setTab('year', event)">By Year</button>
</div>

<div class="charts-grid">
    <div class="chart-box">
        <div class="section-title">Primary ranking</div>
        <canvas id="evChart"></canvas>
    </div>

    <div class="chart-box small-chart-box">
        <div class="section-title">Distribution snapshot</div>
        <canvas id="secondaryChart"></canvas>
    </div>
</div>

<div class="table-box">
    <div class="section-title" id="results">Results table</div>
    <table>
        <thead>
            <tr id="tableHead">
                <th>Make</th>
                <th>Model</th>
                <th class="total-col">Total</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
document.getElementById("timestamp").textContent = new Date().toLocaleString();

const MAKE_COLORS = {
    "TESLA": "#e31937",
    "NISSAN": "#c3002f",
    "CHEVROLET": "#ffd700",
    "FORD": "#003476",
    "VOLKSWAGEN": "#001e50",
    "HYUNDAI": "#002c5f",
    "KIA": "#bb162b",
    "BMW": "#0066b1",
    "AUDI": "#bb0a14",
    "JEEP": "#3a7d44"
};

const DEFAULT_COLOR = "#4f98a3";
const CHART_PALETTE = [
    "#4f98a3",
    "#66b8c5",
    "#7c6cf2",
    "#f28f6c",
    "#9ccc65",
    "#ffd166",
    "#ef476f",
    "#06d6a0",
    "#118ab2",
    "#b388eb",
    "#ff9f1c",
    "#8ecae6"
];

let activeTab = "model";
let chart = null;
let secondaryChart = null;

function animateCount(elementId, target) {
    const el = document.getElementById(elementId);
    const duration = 800;
    const start = performance.now();

    function update(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const current = Math.floor(progress * target);
        el.textContent = current.toLocaleString();
        if (progress < 1) requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
}

function getMake() {
    return document.getElementById("makeFilter").value;
}

function getLimit() {
    return document.getElementById("limitFilter").value;
}

function setTab(tab, event) {
    activeTab = tab;
    document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
    loadAll();
}

function filterTable() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    const rows = document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(query) ? "" : "none";
    });
}

function setStatus(message = "", type = "info") {
    const box = document.getElementById("statusMessage");

    if (!message) {
        box.textContent = "";
        box.className = "status-message hidden";
        return;
    }

    box.textContent = message;
    box.className = `status-message ${type}`;
}

function getChartTitle() {
    if (activeTab === "city") return "Top cities by EV count";
    if (activeTab === "year") return "EV registrations by model year";
    return "Top make/model combinations";
}

async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) {
        throw new Error(`Request failed: ${res.status}`);
    }
    return res.json();
}

async function loadSummary(make) {
    const data = await fetchJSON(`/api/summary?make=${encodeURIComponent(make)}`);
    animateCount("totalVehicles", data.total || 0);
    document.getElementById("topMake").textContent = data.top_make || "-";
    document.getElementById("topModel").textContent = data.top_model || "-";
    document.getElementById("topMakeTip").textContent = `${data.top_make_pct ?? 0}% of total`;
    document.getElementById("topModelTip").textContent = `${data.top_model_pct ?? 0}% of total`;
}

async function loadChart(make) {
    const data = await fetchJSON(`/api/chart?make=${encodeURIComponent(make)}&limit=${getLimit()}&view=${activeTab}`);
    const labels = data.labels || [];
    const values = data.values || [];
    const makes = data.makes || [];
    const colors = activeTab === "model" && !make
        ? makes.map((m, index) => MAKE_COLORS[m] || CHART_PALETTE[index % CHART_PALETTE.length])
        : labels.map((_, index) => CHART_PALETTE[index % CHART_PALETTE.length]);

    if (chart) chart.destroy();

    const rowHeight = 32;
    document.getElementById("evChart").parentElement.style.height = `${Math.max(300, labels.length * rowHeight)}px`;

    chart = new Chart(document.getElementById("evChart"), {
        type: "bar",
        data: {
            labels,
            datasets: [{
                label: getChartTitle(),
                data: values,
                backgroundColor: colors,
                borderRadius: 6,
                barThickness: 18,
                maxBarThickness: 22
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: "y",
            onClick: () => {},
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: (ctx) => ` ${Number(ctx.parsed.x || 0).toLocaleString()} vehicles`
                    }
                }
            },
            scales: {
                x: {
                    beginAtZero: true,
                    min: 0,
                    ticks: {
                        color: "#8f9bb3",
                        callback: (value) => Number(value).toLocaleString()
                    },
                    grid: { color: "#2a2f45" }
                },
                y: {
                    ticks: {
                        color: "#e0e0e0",
                        autoskip: false,
                        font: { size: 11 }
                    },
                    grid: { display: false }
                },
            }
        }
    });

    loadSecondaryChart(labels, values, colors);
}

function loadSecondaryChart(labels, values, colors) {
    if (secondaryChart) secondaryChart.destroy();

    secondaryChart = new Chart(document.getElementById("secondaryChart"), {
        type: "doughnut",
        data: {
            labels,
            datasets: [{
                data: values,
                backgroundColor: colors,
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: "bottom",
                    onClick: () => {},
                    labels: {
                        color: "#d7dced",
                        boxWidth: 12,
                        padding: 16
                    }
                },
                tooltip: {
                    callbacks: {
                        label: (ctx) => {
                            const label = ctx.label || "";
                            const value = Number(ctx.parsed || 0).toLocaleString();
                            return `${label}: ${value} vehicles`;
                        }
                    }
                }
            }
        }
    });
}

async function loadTable(make) {
    const data = await fetchJSON(`/api/table?make=${encodeURIComponent(make)}&limit=${getLimit()}&view=${activeTab}`);
    const tbody = document.getElementById("tableBody");
    const head = document.getElementById("tableHead");

    if (!data.length) {
        head.innerHTML = "<th>Results</th>";
        tbody.innerHTML = `<tr><td>No data found for the current filters.</td></tr>`;
        return;
    }

    const keys = Object.keys(data[0]);
    head.innerHTML = keys.map((k, i) =>
        `<th class="${i === keys.length - 1 ? 'total-col' : ''}">${k}</th>`
    ).join("");

    tbody.innerHTML = data.map(row => `
        <tr>
            ${keys.map((k, i) => {
                const value = row[k];
                const displayValue = k.toLowerCase() === "total" && typeof value === "number"
                    ? value.toLocaleString()
                    : value;
                return `<td class="${i === keys.length - 1 ? 'total-col' : ''}">${displayValue ?? "-"}</td>`;
            }).join("")}
        </tr>
    `).join("");

    filterTable();
}

function exportCSV() {
    const make = encodeURIComponent(getMake());
    const limit = getLimit();
    const url = `/api/export?make=${make}&limit=${limit}&view=${activeTab}`;
    window.location.href = url;
}

async function loadAll() {
    const make = getMake();
    setStatus("Loading dashboard...", "info");

    try {
        await Promise.all([
            loadSummary(make),
            loadChart(make),
            loadTable(make)
        ]);
        setStatus("");
    } catch (error) {
        console.error(error);
        setStatus("Could not load dashboard data. Check your API routes and database.", "error");
    }
}

loadAll();
</script>
</body>
</html>
