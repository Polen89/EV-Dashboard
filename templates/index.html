<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EV Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>Electric Vehicle Dashboard</h1>
    <div class="controls">
      <select id="makeFilter"><option value="">All Makes</option></select>
      <select id="yearFilter"><option value="">All Years</option></select>
      <button id="downloadBtn">Download CSV</button>
    </div>
  </header>

  <main>
    <section class="charts">
      <div class="chart-card">
        <h2>Top 10 Makes by Count</h2>
        <div class="chart-wrapper">
          <canvas id="barChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h2>EV Type Distribution</h2>
        <div class="chart-wrapper">
          <canvas id="donutChart"></canvas>
        </div>
      </div>
    </section>

    <section class="table-section">
      <h2>Vehicle Records</h2>
      <div id="tableContainer"></div>
      <div class="pagination">
        <button id="prevBtn">Prev</button>
        <span id="pageInfo"></span>
        <button id="nextBtn">Next</button>
      </div>
    </section>
  </main>

  <script>
    let barChart, donutChart;
    let currentPage = 1;
    const perPage = 20;
    let currentMake = '', currentYear = '';

    // --- Populate Filters ---
    async function loadFilters() {
      const res = await fetch('/api/summary');
      const data = await res.json();

      const makeSelect = document.getElementById('makeFilter');
      const yearSelect = document.getElementById('yearFilter');

      data.makes.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        makeSelect.appendChild(opt);
      });

      data.years.forEach(y => {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = y;
        yearSelect.appendChild(opt);
      });
    }

    // --- Bar Chart ---
    async function loadBarChart() {
      const params = new URLSearchParams({ make: currentMake, year: currentYear });
      const res = await fetch(`/api/chart?${params}`);
      const data = await res.json();

      const ctx = document.getElementById('barChart').getContext('2d');
      if (barChart) barChart.destroy();

      barChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.labels,
          datasets: [{
            label: 'Vehicle Count',
            data: data.values,
            backgroundColor: 'rgba(99, 179, 237, 0.8)',
            borderColor: 'rgba(99, 179, 237, 1)',
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e293b',
              titleColor: '#94a3b8',
              bodyColor: '#e2e8f0',
              padding: 10
            }
          },
          scales: {
            x: {
              ticks: { color: '#94a3b8' },
              grid: { color: 'rgba(255,255,255,0.05)' }
            },
            y: {
              ticks: { color: '#94a3b8' },
              grid: { color: 'rgba(255,255,255,0.08)' }
            }
          }
        }
      });
    }

    // --- Donut Chart ---
    async function loadDonutChart() {
      const params = new URLSearchParams({ make: currentMake, year: currentYear });
      const res = await fetch(`/api/chart/type?${params}`);
      const data = await res.json();

      const ctx = document.getElementById('donutChart').getContext('2d');
      if (donutChart) donutChart.destroy();

      donutChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: data.labels,
          datasets: [{
            data: data.values,
            backgroundColor: [
              'rgba(99,179,237,0.85)',
              'rgba(154,230,180,0.85)',
              'rgba(251,211,141,0.85)',
              'rgba(252,129,129,0.85)'
            ],
            borderColor: '#1e293b',
            borderWidth: 3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#94a3b8', padding: 16, boxWidth: 14 }
            },
            tooltip: {
              backgroundColor: '#1e293b',
              titleColor: '#94a3b8',
              bodyColor: '#e2e8f0',
              padding: 10
            }
          }
        }
      });
    }

    // --- Table ---
    async function loadTable() {
      const params = new URLSearchParams({
        make: currentMake,
        year: currentYear,
        page: currentPage,
        per_page: perPage
      });
      const res = await fetch(`/api/table?${params}`);
      const data = await res.json();

      const container = document.getElementById('tableContainer');
      if (!data.records || data.records.length === 0) {
        container.innerHTML = '<p class="no-data">No records found.</p>';
        return;
      }

      const headers = Object.keys(data.records[0]);
      let html = '<table><thead><tr>';
      headers.forEach(h => { html += `<th>${h}</th>`; });
      html += '</tr></thead><tbody>';
      data.records.forEach(row => {
        html += '<tr>';
        headers.forEach(h => { html += `<td>${row[h] ?? ''}</td>`; });
        html += '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;

      document.getElementById('pageInfo').textContent =
        `Page ${data.page} of ${data.total_pages}`;
      document.getElementById('prevBtn').disabled = data.page <= 1;
      document.getElementById('nextBtn').disabled = data.page >= data.total_pages;
    }

    // --- Events ---
    document.getElementById('makeFilter').addEventListener('change', e => {
      currentMake = e.target.value; currentPage = 1;
      loadBarChart(); loadDonutChart(); loadTable();
    });

    document.getElementById('yearFilter').addEventListener('change', e => {
      currentYear = e.target.value; currentPage = 1;
      loadBarChart(); loadDonutChart(); loadTable();
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; loadTable(); }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      currentPage++; loadTable();
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const params = new URLSearchParams({ make: currentMake, year: currentYear });
      window.location = `/api/download?${params}`;
    });

    // --- Init ---
    loadFilters();
    loadBarChart();
    loadDonutChart();
    loadTable();
  </script>
</body>
</html>
